<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OfficeMart Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07111f;
        color: #e5f6ff;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top left, rgba(34, 211, 238, 0.18), transparent 38%), #07111f;
      }
      main {
        width: min(1120px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 40px 0;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .cart-link {
        border: 1px solid #2563eb;
        border-radius: 8px;
        background: #0f1d32;
        color: #bfdbfe;
        padding: 10px 14px;
        cursor: pointer;
      }
      .panel {
        border: 1px solid #23344f;
        border-radius: 12px;
        background: rgba(13, 23, 40, 0.92);
        padding: 24px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }
      .search {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
      }
      input {
        border: 1px solid #334155;
        border-radius: 8px;
        background: #0b1220;
        color: #f8fafc;
        padding: 12px 14px;
        font-size: 16px;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: #0284c7;
        color: white;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover {
        background: #0369a1;
      }
      .product,
      .cart {
        display: none;
        margin-top: 22px;
        border: 1px solid #1f8fb8;
        border-radius: 10px;
        padding: 18px;
        background: #0b2334;
      }
      .product.visible,
      .cart.visible {
        display: block;
      }
      .muted {
        color: #94a3b8;
      }
      .row {
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
      }
      .swatch {
        border: 1px solid #38bdf8;
        background: #1e293b;
      }
      .swatch.selected {
        background: #f8e7d0;
        color: #1f2937;
      }
      #quantity {
        width: 88px;
      }
      .summary {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <div class="brand">OfficeMart Demo</div>
          <p class="muted">Stable local storefront for multi-step Navora Lite demos.</p>
        </div>
        <button id="cart-link" class="cart-link" type="button">Cart</button>
      </header>

      <section class="panel">
        <div class="search">
          <input id="search-input" aria-label="Search input" placeholder="Search workspace gear" />
          <button id="search-button" type="button">Search</button>
        </div>

        <article class="product" id="product-card">
          <p class="muted">Best match</p>
          <h1 data-product-name="AURORA TASK LAMP">AURORA TASK LAMP</h1>
          <p>Adjustable LED desk lamp for focused work sessions.</p>
          <button data-testid="product-link" id="product-link" type="button">Open product</button>
        </article>

        <article class="product" id="product-detail">
          <p class="muted">Product detail</p>
          <h2>AURORA TASK LAMP</h2>
          <p>Unit price: <strong>$89</strong></p>
          <div class="row">
            <span>Color</span>
            <button class="swatch" id="color-graphite" type="button">Graphite</button>
            <button class="swatch" id="color-warm-white" type="button">Warm White</button>
          </div>
          <div class="row" style="margin-top: 16px">
            <label for="quantity">Quantity</label>
            <input id="quantity" aria-label="Quantity" value="1" type="number" min="1" />
            <button id="add-to-cart" type="button">Add to Cart</button>
          </div>
        </article>

        <article class="cart" id="cart-panel">
          <p class="muted">Cart summary</p>
          <h2 id="cart-product-name">AURORA TASK LAMP</h2>
          <div class="summary">
            <span>
              Color:
              <strong id="cart-color" data-cart-color="Warm White">Warm White</strong>
            </span>
            <span>
              Quantity:
              <strong id="cart-quantity" data-cart-quantity="2">2</strong>
            </span>
            <span>
              Subtotal:
              <strong id="cart-subtotal" data-cart-subtotal="$178">$178</strong>
            </span>
          </div>
        </article>
      </section>
    </main>
    <script>
      const productCard = document.querySelector("#product-card");
      const productDetail = document.querySelector("#product-detail");
      const cartPanel = document.querySelector("#cart-panel");
      const quantity = document.querySelector("#quantity");
      const cartQuantity = document.querySelector("#cart-quantity");
      const cartColor = document.querySelector("#cart-color");
      const cartSubtotal = document.querySelector("#cart-subtotal");
      const warmWhite = document.querySelector("#color-warm-white");
      const graphite = document.querySelector("#color-graphite");
      let selectedColor = "Graphite";

      function selectColor(value) {
        selectedColor = value;
        warmWhite.classList.toggle("selected", value === "Warm White");
        graphite.classList.toggle("selected", value === "Graphite");
      }

      document.querySelector("#search-button").addEventListener("click", () => {
        productCard.classList.add("visible");
      });
      document.querySelector("#product-link").addEventListener("click", () => {
        productDetail.classList.add("visible");
      });
      warmWhite.addEventListener("click", () => selectColor("Warm White"));
      graphite.addEventListener("click", () => selectColor("Graphite"));
      document.querySelector("#add-to-cart").addEventListener("click", () => {
        const value = quantity.value || "1";
        const subtotal = `$${Number.parseInt(value, 10) * 89}`;
        cartColor.textContent = selectedColor;
        cartColor.setAttribute("data-cart-color", selectedColor);
        cartQuantity.textContent = value;
        cartQuantity.setAttribute("data-cart-quantity", value);
        cartSubtotal.textContent = subtotal;
        cartSubtotal.setAttribute("data-cart-subtotal", subtotal);
        cartPanel.classList.add("visible");
      });
      document.querySelector("#cart-link").addEventListener("click", () => {
        cartPanel.classList.add("visible");
      });
    </script>
  </body>
</html>
